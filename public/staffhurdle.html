<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commission — Staff Hurdles</title>
    <script src="https://unpkg.com/htmx.org@1.6.1"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="site-nav">
        <span class="site-nav-title">Commission</span>
        <ul class="site-nav-links">
            <li><a href="index.html">Config</a></li>
            <li><a href="staffhurdle.html" class="active">Staff Hurdles</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Staff Hurdle Config</h1>

        <div class="panel">
            <div class="panel-header">
                <h2 class="panel-title">Staff</h2>
                <input type="text" id="search-box" placeholder="Search staff…" class="form-input" style="max-width: 18rem;">
            </div>
            <form id="staff-hurdle-form" hx-post="/update-staff-hurdle" hx-trigger="submit" hx-swap="none">
                <div class="data-table-wrapper">
                    <table id="staff-hurdle-table" class="data-table">
                        <thead>
                            <tr>
                                <th onclick="sortTable(0)">ID <span id="sort-indicator-0"></span>
                                    <div class="resize-handle" onmousedown="initResize(event, 0)"></div>
                                </th>
                                <th onclick="sortTable(1)">Staff Name <span id="sort-indicator-1"></span>
                                    <div class="resize-handle" onmousedown="initResize(event, 1)"></div>
                                </th>
                                <th onclick="sortTable(2)">MB Comm Rate <span id="sort-indicator-2"></span>
                                    <div class="resize-handle" onmousedown="initResize(event, 2)"></div>
                                </th>
                                <th onclick="sortTable(3)">Base Rate <span id="sort-indicator-3"></span>
                                    <div class="resize-handle" onmousedown="initResize(event, 3)"></div>
                                </th>
                                <th onclick="sortTable(4)">Hurdle 1 Level <span id="sort-indicator-4"></span>
                                    <div class="resize-handle" onmousedown="initResize(event, 4)"></div>
                                </th>
                                <th onclick="sortTable(5)">Hurdle 1 Rate <span id="sort-indicator-5"></span>
                                    <div class="resize-handle" onmousedown="initResize(event, 5)"></div>
                                </th>
                                <th onclick="sortTable(6)">Hurdle 2 Level <span id="sort-indicator-6"></span>
                                    <div class="resize-handle" onmousedown="initResize(event, 6)"></div>
                                </th>
                                <th onclick="sortTable(7)">Hurdle 2 Rate <span id="sort-indicator-7"></span>
                                    <div class="resize-handle" onmousedown="initResize(event, 7)"></div>
                                </th>
                                <th onclick="sortTable(8)">Hurdle 3 Level <span id="sort-indicator-8"></span>
                                    <div class="resize-handle" onmousedown="initResize(event, 8)"></div>
                                </th>
                                <th onclick="sortTable(9)">Hurdle 3 Rate <span id="sort-indicator-9"></span>
                                    <div class="resize-handle" onmousedown="initResize(event, 9)"></div>
                                </th>
                                <th class="checkbox-col" onclick="sortTable(10)">Contractor <span
                                        id="sort-indicator-10"></span>
                                    <div class="resize-handle" onmousedown="initResize(event, 10)"></div>
                                </th>
                                <th class="checkbox-col" onclick="sortTable(11)">Pay Via Talenox <span
                                        id="sort-indicator-11"></span>
                                    <div class="resize-handle" onmousedown="initResize(event, 11)"></div>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="staff-hurdle-tbody">
                            <!-- Rows will be dynamically added here -->
                        </tbody>
                    </table>
                </div>
                <button type="submit" class="btn mt-6">Update Config</button>
            </form>
        </div>

        <!-- Feedback -->
        <div id="confirmation-dialog" class="feedback feedback-success">Config updated successfully!</div>
        <div id="error-dialog" class="feedback feedback-error"></div>
    </div>

    <script>
        const staffHurdleForm = document.getElementById('staff-hurdle-form');
        const staffHurdleTbody = document.getElementById('staff-hurdle-tbody');
        const errorDialog = document.getElementById('error-dialog');
        const searchBox = document.getElementById('search-box');
        const confirmationDialog = document.getElementById('confirmation-dialog');
        let sortOrder = 1;
        let currentSortColumn = -1;
        let startX, startWidth;

        fetch('/staff-hurdle-config')
            .then(response => response.json())
            .then(data => {
                populateTable(data);
            })
            .catch(error => {
                console.error('Error fetching staff hurdle config:', error);
                errorDialog.textContent = 'Error fetching staff hurdle config';
                errorDialog.classList.add('visible');
            });

        function populateTable(data) {
            staffHurdleTbody.innerHTML = '';
            for (const id in data) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${id}</td>
                    <td><input type="text" name="staffName-${id}" value="${data[id].staffName}"></td>
                    <td><input type="number" name="mbCommRate-${id}" value="${data[id].mbCommRate}"></td>
                    <td><input type="number" name="baseRate-${id}" value="${data[id].baseRate}"></td>
                    <td><input type="number" name="hurdle1Level-${id}" value="${data[id].hurdle1Level}"></td>
                    <td><input type="number" name="hurdle1Rate-${id}" value="${data[id].hurdle1Rate}"></td>
                    <td><input type="number" name="hurdle2Level-${id}" value="${data[id].hurdle2Level}"></td>
                    <td><input type="number" name="hurdle2Rate-${id}" value="${data[id].hurdle2Rate}"></td>
                    <td><input type="number" name="hurdle3Level-${id}" value="${data[id].hurdle3Level}"></td>
                    <td><input type="number" name="hurdle3Rate-${id}" value="${data[id].hurdle3Rate}"></td>
                    <td class="checkbox-col"><input type="checkbox" name="contractor-${id}" ${data[id].contractor ? 'checked' : ''}></td>
                    <td class="checkbox-col"><input type="checkbox" name="payViaTalenox-${id}" ${data[id].payViaTalenox ? 'checked' : ''}></td>
                `;
                staffHurdleTbody.appendChild(row);
            }
        }

        function sortTable(columnIndex) {
            const rows = Array.from(staffHurdleTbody.rows);
            const sortedRows = rows.sort((a, b) => {
                const aText = a.cells[columnIndex].querySelector('input:not([type="checkbox"]), select, textarea')?.value || a.cells[columnIndex].innerText.trim();
                const bText = b.cells[columnIndex].querySelector('input:not([type="checkbox"]), select, textarea')?.value || b.cells[columnIndex].innerText.trim();
                return aText.localeCompare(bText, undefined, { numeric: true }) * sortOrder;
            });
            staffHurdleTbody.innerHTML = '';
            sortedRows.forEach(row => staffHurdleTbody.appendChild(row));
            updateSortIndicators(columnIndex);
            sortOrder *= -1;
        }

        function updateSortIndicators(columnIndex) {
            if (currentSortColumn !== -1) {
                document.getElementById(`sort-indicator-${currentSortColumn}`).innerText = '';
            }
            const indicator = document.getElementById(`sort-indicator-${columnIndex}`);
            indicator.innerText = sortOrder === 1 ? '\u25B2' : '\u25BC';
            currentSortColumn = columnIndex;
        }

        searchBox.addEventListener('input', () => {
            const searchTerm = searchBox.value.toLowerCase();
            const rows = Array.from(staffHurdleTbody.rows);
            rows.forEach(row => {
                const cells = Array.from(row.cells);
                const matches = cells.some(cell => {
                    const input = cell.querySelector('input:not([type="checkbox"]), select, textarea');
                    const text = input ? input.value : cell.innerText;
                    return text.toLowerCase().includes(searchTerm);
                });
                row.style.display = matches ? '' : 'none';
            });
        });

        staffHurdleForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const formData = new FormData(staffHurdleForm);
            const staffHurdleConfig = {};

            formData.forEach((value, key) => {
                const [field, id] = key.split('-');
                if (!staffHurdleConfig[id]) {
                    staffHurdleConfig[id] = {};
                }
                staffHurdleConfig[id][field] = field.includes('Rate') || field.includes('Level') ? parseFloat(value) : value;
                if (field === 'contractor' || field === 'payViaTalenox') {
                    staffHurdleConfig[id][field] = value === 'on';
                }
            });

            fetch('/update-staff-hurdle', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(staffHurdleConfig)
            })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        errorDialog.textContent = data.message;
                        errorDialog.classList.add('visible');
                    } else {
                        showConfirmation();
                    }
                })
                .catch(error => {
                    console.error('Error updating staff hurdle config:', error);
                    errorDialog.textContent = 'Error updating staff hurdle config';
                    errorDialog.classList.add('visible');
                });
        });

        function showConfirmation() {
            confirmationDialog.classList.add('visible');
            setTimeout(() => {
                confirmationDialog.classList.remove('visible');
            }, 3000);
        }

        htmx.on('htmx:beforeRequest', (event) => {
            if (event.detail.elt.id === 'staff-hurdle-form') {
                errorDialog.textContent = '';
                errorDialog.classList.remove('visible');
            }
        });

        htmx.on('htmx:responseError', (event) => {
            if (event.detail.elt.id === 'staff-hurdle-form') {
                errorDialog.textContent = event.detail.xhr.responseText;
                errorDialog.classList.add('visible');
            }
        });

        function initResize(event, columnIndex) {
            event.stopPropagation();
            startX = event.clientX;
            const th = event.target.parentElement;
            startWidth = th.offsetWidth;
            document.addEventListener('mousemove', doResize);
            document.addEventListener('mouseup', stopResize);

            function doResize(e) {
                const newWidth = startWidth + (e.clientX - startX);
                th.style.width = `${newWidth}px`;
                const table = document.getElementById('staff-hurdle-table');
                table.querySelectorAll(`th:nth-child(${columnIndex + 1}), td:nth-child(${columnIndex + 1})`).forEach(cell => {
                    cell.style.width = `${newWidth}px`;
                });
            }

            function stopResize() {
                document.removeEventListener('mousemove', doResize);
                document.removeEventListener('mouseup', stopResize);
            }
        }
    </script>
</body>

</html>
